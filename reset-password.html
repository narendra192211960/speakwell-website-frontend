<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SpeakWell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p id="resetEmailText" style="color: var(--text-muted);"></p>
            </div>

            <div id="alert" class="alert"></div>

            <!-- Step 1: Verify OTP -->
            <div id="otpSection">
                <div class="form-group" style="margin-bottom: 24px;">
                    <label for="otp">Enter 6-digit OTP</label>
                    <input type="text" id="otp" class="form-control" placeholder="000000" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 4px; font-weight: 700;">
                </div>
                <button type="button" class="btn-primary" id="verifyOtpBtn">Verify OTP</button>
            </div>

            <!-- Step 2: New Password (Hidden until OTP verified) -->
            <div id="passwordSection" style="display: none;">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="••••••••">
                    <small style="color: var(--text-muted); font-size: 0.8rem;">Min 8 chars, 1 uppercase, 1 number, 1 special char.</small>
                </div>
                <div class="form-group" style="margin-bottom: 32px;">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••">
                </div>
                <button type="button" class="btn-primary" id="confirmResetBtn">Reset Password</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/validation.js"></script>
    <script>
        const email = sessionStorage.getItem('reset_email');
        if (!email) window.location.href = 'forgot-password.html';

        document.getElementById('resetEmailText').textContent = `Resetting password for ${email}`;

        // Verify OTP Step
        document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
            const otp = document.getElementById('otp').value;
            if (!Validation.otp(otp)) return showAlert('Please enter a 6-digit OTP.', 'error');

            const btn = document.getElementById('verifyOtpBtn');
            try {
                btn.disabled = true;
                btn.textContent = 'Verifying...';
                
                const response = await API.verifyOtp(email, otp);
                if (response.status === 'success') {
                    document.getElementById('otpSection').style.display = 'none';
                    document.getElementById('passwordSection').style.display = 'block';
                    showAlert('OTP verified. Please enter your new password.', 'success');
                } else {
                    showAlert(response.message || 'Invalid OTP.', 'error');
                }
            } catch (error) {
                showAlert('Verification failed.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify OTP';
            }
        });

        // Reset Password Step
        document.getElementById('confirmResetBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Strict validation matching Android app
            const hasUpperCase = /[A-Z]/.test(newPassword);
            const hasNumber = /[0-9]/.test(newPassword);
            const hasSpecialChar = /[!@#$%^&*(),.?":{}|<>]/.test(newPassword);

            if (newPassword.length < 8 || !hasUpperCase || !hasNumber || !hasSpecialChar) {
                return showAlert('Password does not meet complexity requirements.', 'error');
            }
            if (newPassword !== confirmPassword) {
                return showAlert('Passwords do not match.', 'error');
            }

            const btn = document.getElementById('confirmResetBtn');
            try {
                btn.disabled = true;
                btn.textContent = 'Resetting...';
                
                // Using forgotPassword endpoint as per Android app logic
                const response = await API.forgotPassword(email, newPassword);
                
                if (response.status === 'success') {
                    sessionStorage.removeItem('reset_email');
                    showAlert('Password reset successful! Please login.', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showAlert(response.message || 'Error resetting password.', 'error');
                }
            } catch (error) {
                showAlert('Reset failed. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });

        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            alert.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
