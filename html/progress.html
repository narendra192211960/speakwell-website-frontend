<style>
    .progress-hero {
        padding: 48px;
        text-align: center;
        margin-bottom: 32px;
        background: #fdfaf5; /* Creamy background from app */
        border: 1px solid #fef3c7;
    }

    .hero-stats { width: 100%; max-width: 600px; margin: 0 auto; }
    
    .overall-progress-title { font-size: 1.8rem; font-weight: 800; color: #1e293b; margin-bottom: 20px; }
    
    .accuracy-container {
        padding: 32px;
        margin-top: 32px;
    }

    /* Stats Grid Single Line */
    .progress-stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 32px;
    }

    .stat-card-new {
        padding: 16px;
        border-radius: 20px;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .stat-header { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 0.8rem; }
    .stat-icon { font-size: 1rem; }
    .stat-title { color: #64748b; }
    .stat-value { font-size: 1.5rem; font-weight: 800; color: #1e293b; }
    .stat-sub { font-size: 0.75rem; font-weight: 600; }

    /* Specific Stat Colors & Unified Overlays */
    .stat-streak, .stat-accuracy, .stat-sessions, .stat-words {
        background: #fdfaf5;
        border: 1px solid #fef3c7;
    }

    .stat-streak .stat-icon, .stat-streak .stat-sub { color: #f97316; }
    .stat-accuracy .stat-icon, .stat-accuracy .stat-sub { color: #3b82f6; }
    .stat-sessions .stat-icon, .stat-sessions .stat-sub { color: #10b981; }
    .stat-words .stat-icon, .stat-words .stat-sub { color: #f59e0b; }

    .daily-accuracy-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-bottom: 32px;
    }

    .accuracy-item {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .day-name {
        width: 45px;
        font-weight: 600;
        color: #94a3b8;
        font-size: 0.9rem;
    }

    .accuracy-bar-wrapper {
        flex: 1;
        height: 12px;
        background: #f1f5f9;
        border-radius: 99px;
        overflow: hidden;
    }

    .accuracy-bar {
        height: 100%;
        width: 0%;
        border-radius: 99px;
        transition: width 1s cubic-bezier(0.1, 0.7, 1.0, 0.1);
    }

    .accuracy-value {
        width: 45px;
        font-weight: 800;
        font-size: 0.9rem;
        text-align: right;
    }

    .accuracy-legend {
        border-top: 1px solid var(--card-border);
        padding-top: 24px;
    }

    .legend-title {
        font-size: 1rem;
        font-weight: 800;
        color: #94a3b8;
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .legend-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #64748b;
    }

    .legend-color {
        width: 10px;
        height: 10px;
        border-radius: 50%;
    }
</style>

<div class="main-wrapper">
    <main class="main-content">
        <header class="page-header">
            <h1 style="font-size: 2rem; font-weight: 800; color: var(--primary-dark);">Your Progress</h1>
            <p style="color: var(--text-muted);">Track your improvement and achievements</p>
        </header>

        <!-- Overall Progress Card -->
        <div id="alert-progress" class="alert"></div>
        <div class="glass-card progress-hero">
            <div class="hero-stats">
                <h2 class="overall-progress-title" id="overallLabel">Overall Progress: 0%</h2>
                <div style="height: 16px; background: #f1f5f9; border-radius: 99px; overflow: hidden; margin-bottom: 20px;">
                    <div id="pbOverall" style="height: 100%; width: 0%; background: #f59e0b; transition: width 1s ease;"></div>
                </div>
                <p style="color: #64748b; font-weight: 600;" id="progressStatus">You're doing great! Keep it up.</p>
            </div>
        </div>

        <!-- 2x2 Stats Grid -->
        <div class="progress-stats-grid">
            <div class="glass-card stat-card-new stat-streak">
                <div class="stat-header">
                    <span class="stat-icon">🔥</span>
                    <span class="stat-title">Current Streak</span>
                </div>
                <div class="stat-value" id="streakVal">0</div>
                <div class="stat-sub">days active</div>
            </div>

            <div class="glass-card stat-card-new stat-accuracy">
                <div class="stat-header">
                    <span class="stat-icon">🎯</span>
                    <span class="stat-title">Avg Accuracy</span>
                </div>
                <div class="stat-value" id="accuracyVal">0%</div>
                <div class="stat-sub">overall average</div>
            </div>

            <div class="glass-card stat-card-new stat-sessions">
                <div class="stat-header">
                    <span class="stat-icon">📅</span>
                    <span class="stat-title">Sessions</span>
                </div>
                <div class="stat-value" id="sessionsVal">0</div>
                <div class="stat-sub">total completed</div>
            </div>

            <div class="glass-card stat-card-new stat-words">
                <div class="stat-header">
                    <span class="stat-icon">🏆</span>
                    <span class="stat-title">Words</span>
                </div>
                <div class="stat-value" id="wordsVal">0</div>
                <div class="stat-sub">practiced</div>
            </div>
        </div>

        <!-- Day by Day Accuracy -->
        <div class="glass-card accuracy-container">
            <h3 style="margin-bottom: 24px; font-weight: 800; color: var(--primary-dark);">Day by Day Accuracy</h3>
            
            <div id="dailyAccuracyList" class="daily-accuracy-list">
                <!-- Dynamically populated -->
                <p style="color: var(--text-muted); text-align: center; padding: 20px;">No practice data yet.</p>
            </div>

            <div class="accuracy-legend">
                <p class="legend-title">Accuracy Legend</p>
                <div class="legend-grid" id="legendGrid">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    (async function initProgress() {
        const userId = Auth.getUserId();
        if (!userId) return;

        /* ACCURACY_LEVELS moved to js/utils.js */

        try {
            const res = await API.getProgress(userId);
            if (res.status === 'success') {
                updateUI(res);
                populateAccuracyDisplay(res.daily_accuracy || []);
                renderLegend();
            }
        } catch (error) { 
            console.error('Error fetching progress:', error); 
            showProgressAlert('Error loading progress data. Please try again.', 'error');
        }

        function showProgressAlert(msg, type) {
            const alert = document.getElementById('alert-progress');
            if (!alert) return;
            alert.textContent = msg;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            alert.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        /* getAccuracyColor moved to js/utils.js */

        function updateUI(data) {
            const perc = data.progress_percentage || 0;
            const label = document.getElementById('overallLabel');
            const pb = document.getElementById('pbOverall');
            const status = document.getElementById('progressStatus');
            
            if(label) label.textContent = `Overall Progress: ${perc}%`;
            if(pb) {
                pb.style.width = `${perc}%`;
                // Use dynamic color based on accuracy legend
                pb.style.background = getAccuracyColor(perc);
            }
            
            if(document.getElementById('streakVal')) document.getElementById('streakVal').textContent = data.current_streak || 0;
            if(document.getElementById('accuracyVal')) document.getElementById('accuracyVal').textContent = `${data.overall_accuracy || 0}%`;
            if(document.getElementById('sessionsVal')) document.getElementById('sessionsVal').textContent = data.completed_sessions || 0;
            if(document.getElementById('wordsVal')) document.getElementById('wordsVal').textContent = data.total_words_practiced || 0;

            if (perc > 0 && status) {
                status.textContent = "You're doing great! Keep it up.";
            } else if (status) {
                status.textContent = "Keep practicing to reach your goals!";
            }
        }

        function populateAccuracyDisplay(dailyData) {
            const container = document.getElementById('dailyAccuracyList');
            if (!container) return;

            if (dailyData.length === 0) return;

            container.innerHTML = '';
            dailyData.forEach(day => {
                const color = getAccuracyColor(day.accuracy);
                const item = document.createElement('div');
                item.className = 'accuracy-item';
                item.innerHTML = `
                    <span class="day-name">${day.day_name || 'Day'}</span>
                    <div class="accuracy-bar-wrapper">
                        <div class="accuracy-bar" style="width: ${day.accuracy}%; background: ${color}"></div>
                    </div>
                    <span class="accuracy-value" style="color: ${color}">${day.accuracy}%</span>
                `;
                container.appendChild(item);
            });
        }

        function renderLegend() {
            const grid = document.getElementById('legendGrid');
            if (!grid) return;

            grid.innerHTML = ACCURACY_LEVELS.map(level => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${level.color}"></div>
                    <span>${level.label}</span>
                </div>
            `).join('');
        }
    })();
</script>
