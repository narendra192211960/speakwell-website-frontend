    <script>
        (function() {
            window.refreshUserProfile = async function() {
                const userId = Auth.getUserId();
                if (!userId) return;

                try {
                    console.log('Syncing profile from server...');
                    const res = await API.getProfile(userId);
                    if (res.status === 'success' && res.user) {
                        const user = res.user;
                        // Update localStorage
                        localStorage.setItem('user_name', user.name);
                        localStorage.setItem('user_email', user.email);
                        localStorage.setItem('user_phone', user.phone_number);
                        localStorage.setItem('user_age', user.age);
                        if (user.profile_picture) {
                            localStorage.setItem('profileImage', user.profile_picture);
                            localStorage.setItem('isCustomProfile', 'true');
                        } else {
                            localStorage.setItem('isCustomProfile', 'false');
                            localStorage.removeItem('profileImage');
                        }

                        // Update global UI elements
                        updateGlobalUI(user);
                        
                        // Trigger page-specific updates if they have listeners
                        window.dispatchEvent(new CustomEvent('profileSynced', { detail: { user } }));
                    }
                } catch (error) {
                    console.error('Profile sync error:', error);
                }
            };
            
            window.refreshAllStats = async function() {
                const userId = Auth.getUserId();
                if (!userId) return;
                
                console.log('Refreshing all user stats...');
                try {
                    // Sync profile first
                    await refreshUserProfile();
                    
                    // Specific pages have their own init/stats logic that runs on 'pageLoaded'
                    // but we can also trigger a custom event if they are already visible
                    window.dispatchEvent(new CustomEvent('statsUpdated', { detail: { userId } }));
                } catch (e) {
                    console.error('Stats refresh error:', e);
                }
            };

            function updateGlobalUI(user) {
                // Welcome message on home page
                const welcomeNameEl = document.getElementById('welcomeUserName');
                if (welcomeNameEl) {
                    welcomeNameEl.textContent = user.name.split(' ')[0];
                }
                
                const greetingEl = document.getElementById('greetingMessage');
                if (greetingEl) {
                    const hour = new Date().getHours();
                    let greeting = "Good Night!";
                    if (hour < 12) greeting = "Good Morning!";
                    else if (hour < 17) greeting = "Good Afternoon!";
                    else if (hour < 21) greeting = "Good Evening!";
                    greetingEl.textContent = greeting;
                }

                // Profile display in Settings (if tpl-settings is active)
                const stNameDisp = document.getElementById('profile-name-display');
                if (stNameDisp) stNameDisp.textContent = user.name;
                
                const stEmailDisp = document.getElementById('profile-email-display');
                if (stEmailDisp) stEmailDisp.textContent = user.email;

                // Sync settings form fields if visible
                const stNameInput = document.getElementById('st-name');
                if (stNameInput && stNameInput.disabled) stNameInput.value = user.name;
                
                const stAgeInput = document.getElementById('st-age');
                if (stAgeInput && stAgeInput.disabled) stAgeInput.value = user.age;
                
                const stEmailInput = document.getElementById('st-email');
                if (stEmailInput) stEmailInput.value = user.email;
                
                const stPhoneInput = document.getElementById('st-phone-display');
                if (stPhoneInput) stPhoneInput.value = user.phone_number;

                // Sync profile picture
                const picUrl = user.profile_picture || localStorage.getItem('profileImage');
                const isCustom = localStorage.getItem('isCustomProfile') === 'true';
                const BASE = (typeof window.BASE_URL !== 'undefined') ? window.BASE_URL : 'http://10.196.124.173:5000/';
                
                if (picUrl && picUrl !== 'null' && picUrl !== 'undefined') {
                    const fullUrl = picUrl.startsWith('http') ? picUrl : (BASE + (picUrl.startsWith('/') ? picUrl.slice(1) : picUrl));
                    
                    // Home pic
                    const homePicImg = document.getElementById('home-user-profile-img');
                    const homeDefaultSvg = document.getElementById('home-default-avatar');
                    if (homePicImg) {
                        homePicImg.onload = () => {
                            if (homeDefaultSvg) homeDefaultSvg.style.display = 'none';
                        };
                        homePicImg.onerror = () => {
                            homePicImg.style.display = 'none';
                            if (homeDefaultSvg) homeDefaultSvg.style.display = 'flex';
                        };
                        homePicImg.src = fullUrl;
                        homePicImg.style.display = 'block';
                    }

                    // Settings pic
                    const settingsPicImg = document.getElementById('user-profile-img');
                    const settingsDefaultSvg = document.getElementById('default-avatar');
                    if (settingsPicImg) {
                        settingsPicImg.onload = () => {
                            if (settingsDefaultSvg) settingsDefaultSvg.style.display = 'none';
                        };
                        settingsPicImg.onerror = () => {
                            settingsPicImg.style.display = 'none';
                            if (settingsDefaultSvg) settingsDefaultSvg.style.display = 'flex';
                        };
                        settingsPicImg.src = fullUrl;
                        settingsPicImg.style.display = 'block';
                    }
                } else {
                    localStorage.removeItem('profileImage');
                    localStorage.setItem('isCustomProfile', 'false');
                    ['home', 'settings'].forEach(page => {
                        const img = document.getElementById(`${page === 'home' ? 'home-' : ''}user-profile-img`);
                        const svg = document.getElementById(`${page === 'home' ? 'home-default-' : 'default-'}avatar`);
                        if (img) {
                            img.style.display = 'none';
                            img.src = '';
                            if (svg) svg.style.display = 'flex';
                        }
                    });
                }
            }

            // Initial sync from cache (Optimistic UI)
            (function initFromCache() {
                const user = {
                    name: localStorage.getItem('user_name') || 'User',
                    email: localStorage.getItem('user_email') || '',
                    phone_number: localStorage.getItem('user_phone') || '',
                    age: localStorage.getItem('user_age') || '',
                    profile_picture: localStorage.getItem('profileImage')
                };
                updateGlobalUI(user);
            })();

            // Sync with server on load
            window.addEventListener('DOMContentLoaded', () => {
                refreshUserProfile();
            });

            // Also sync when the home page or settings page is loaded through the router
            window.addEventListener('pageLoaded', (e) => {
                const statsPages = ['home', 'settings', 'progress', 'training'];
                if (statsPages.includes(e.detail.page)) {
                    refreshAllStats();
                }
            });
        })();
    </script>
